<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidco SEO Bulk Automation - Pro Version</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; }
        .container { width: 95%; max-width: 1250px; margin: 20px auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.2rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 10px 20px; cursor: pointer; font-weight: 600; border-radius: 8px; }
        .tab-btn.active { color: var(--text-main); background: var(--card-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 120px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); padding: 10px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border); color: var(--text-muted); }
        td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .status-badge { padding: 3px 7px; border-radius: 5px; font-size: 0.75rem; font-weight: 600; }
        .status-success { background: #064e3b; color: #34d399; }
        .status-error { background: #7f1d1d; color: #f87171; }
        .status-running { background: #1e3a8a; color: #60a5fa; }
        .code-box { background: #000; padding: 3px 6px; border-radius: 4px; font-family: monospace; color: #10b981; border: 1px solid #334155; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }
        .login-cell { display: flex; gap: 5px; align-items: center; }
        .btn-mini { padding: 4px 6px; font-size: 0.7rem; border-radius: 4px; background: var(--border); color: white; border: none; cursor: pointer; }
        .btn-main { background: var(--primary); }
        .check-options { display: flex; gap: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; flex-wrap: wrap; }
        .check-options label { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer; }
        .match-box { padding: 5px; border-radius: 4px; border: 1px solid transparent; }
        .mismatch { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .match { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Vidco SEO Bulk Automation</h1>
        <p style="color:var(--text-muted)">Hệ thống giám sát SEO & 301 Redirect Chuyên sâu</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tab1')">➕ GSC Bulk</button>
        <button class="tab-btn" onclick="showTab('tab2')">🔍 Check Website Status</button>
    </div>

    <!-- TAB 1 -->
    <div id="tab1" class="tab-content active">
        <div class="card">
            <textarea id="domainList" placeholder="Nhập domain GSC..."></textarea>
            <button id="btnStart" class="btn" style="margin-top:10px">🚀 Chạy GSC</button>
            <p id="authStatus" style="font-size:0.8rem; margin-top:5px"></p>
            <table id="resultTable">
                <thead><tr><th>Website</th><th>Status</th><th>Verify</th><th>Code</th><th>Action</th></tr></thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>

    <!-- TAB 2 -->
    <div id="tab2" class="tab-content">
        <div class="card">
            <textarea id="checkDomainList" placeholder="Gốc [Tab] Theo_dõi [Tab] Admin [Tab] User [Tab] Pass"></textarea>
            <div class="check-options" style="margin-top:10px">
                <label><input type="checkbox" id="optWebsite" checked> 🌐 Status</label>
                <label><input type="checkbox" id="opt301" checked> 🔄 301 Trace</label>
                <label><input type="checkbox" id="optAdmin" checked> 🔑 Admin</label>
                <label><input type="checkbox" id="optLogin" checked> 🔐 Login</label>
            </div>
            <button id="btnCheck" class="btn btn-warning">🔍 Bắt đầu kiểm tra</button>
            <table id="checkResultTable">
                <thead><tr><th>Website URL</th></tr></thead>
                <tbody id="checkResultBody"></tbody>
            </table>
            <div id="actionBars" style="display:none; margin-top:15px; display:flex; gap:10px; border-top:1px solid var(--border); padding-top:15px;">
                <button class="btn btn-success" onclick="copyCol('chkMatch_')">📋 Copy Đích Cuối</button>
                <button class="btn" style="background:#6366f1" onclick="copyCol('chkChain_')">📋 Copy Chuỗi</button>
                <button class="btn btn-danger" onclick="filterFails()">🔴 Lọc lỗi Login</button>
                <button class="btn" onclick="showAll()">📋 Hiện tất cả</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CLIENT_ID = '376378457788-i7v1u8pce8j91m9s341g234c9f13eie9.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/webmasters https://www.googleapis.com/auth/siteverification';
    let accessToken = null;

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- TAB 1 LOGIC (Rút gọn) ---
    document.getElementById('btnStart').onclick = () => {
        const client = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { accessToken = res.access_token; runGSC(); }
        });
        client.requestAccessToken();
    };

    async function runGSC() {
        const domains = document.getElementById('domainList').value.split('\n').filter(d => d.trim());
        const tbody = document.getElementById('resultBody'); tbody.innerHTML = '';
        for (let i = 0; i < domains.length; i++) {
            let d = domains[i].trim(); if(!d.startsWith('http')) d = 'https://'+d; if(!d.endsWith('/')) d += '/';
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${d}</td><td id="st_${i}">...</td><td id="v_${i}">-</td><td id="c_${i}">...</td><td id="a_${i}">-</td>`;
            tbody.appendChild(tr);
            // Gọi API GSC... (giả lập hoặc rút gọn ở đây để tập trung TAB 2)
            document.getElementById(`st_${i}`).innerHTML = '<span class="status-badge status-success">OK</span>';
        }
    }

    // --- TAB 2 LOGIC (TRỌNG TÂM: DEEP SCAN) ---
    const proxies = [
        (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
    ];

    document.getElementById('btnCheck').onclick = async () => {
        const lines = document.getElementById('checkDomainList').value.split('\n').filter(l => l.trim());
        const opts = { web: document.getElementById('optWebsite').checked, rdr: document.getElementById('opt301').checked, adm: document.getElementById('optAdmin').checked, log: document.getElementById('optLogin').checked };
        
        const tbody = document.getElementById('checkResultBody');
        const thead = tbody.closest('table').querySelector('thead tr');
        thead.innerHTML = '<th>Website URL</th>';
        if(opts.web) thead.innerHTML += '<th>Status</th><th>Code</th>';
        if(opts.rdr) thead.innerHTML += '<th>Chuỗi Redirect</th><th>So khớp 301</th>';
        if(opts.adm) thead.innerHTML += '<th>Admin</th>';
        if(opts.log) thead.innerHTML += '<th>Login</th>';
        tbody.innerHTML = '';

        const sites = lines.map(l => {
            const p = l.split(/[\t ]+/);
            return { origin: fixUrl(p[0]), recorded: fixUrl(p[1]||p[0]), admin: p[2]||'wp-admin', user: p[3]||'', pass: p[4]||'' };
        });

        sites.forEach((s, i) => {
            const tr = document.createElement('tr'); tr.id = `row_${i}`;
            let cells = `<td class="domain-cell"><b>${short(s.origin)}</b><br><span style="color:var(--text-muted);font-size:10px">🎯 ${short(s.recorded)}</span></td>`;
            if(opts.web) cells += `<td id="st2_${i}">...</td><td id="cd2_${i}">-</td>`;
            if(opts.rdr) cells += `<td id="chkChain_${i}">...</td><td id="chkMatch_${i}">...</td>`;
            if(opts.adm) cells += `<td id="chkAdmin_${i}">...</td>`;
            if(opts.log) cells += `<td id="chkLogin_${i}">...</td>`;
            tr.innerHTML = cells; tbody.appendChild(tr);
        });

        document.getElementById('actionBars').style.display = 'flex';

        for (let i = 0; i < sites.length; i++) {
            const s = sites[i];
            let actualFinal = s.origin;
            let chain = [s.origin];

            // 1. Check Status
            if (opts.web) {
                try {
                    const res = await fetch(proxies[1](s.origin));
                    document.getElementById(`cd2_${i}`).textContent = res.status;
                    if(res.ok) document.getElementById(`st2_${i}`).innerHTML = '<span class="status-badge status-success">Live</span>';
                    else document.getElementById(`st2_${i}`).innerHTML = '<span class="status-badge status-error">Die</span>';
                } catch(e) { document.getElementById(`st2_${i}`).innerHTML = 'ERR'; }
            }

            // 2. 301 TRACE (MẮT THẦN + DEEP SCAN)
            if (opts.rdr) {
                const chainCell = document.getElementById(`chkChain_${i}`);
                const matchCell = document.getElementById(`chkMatch_${i}`);
                chainCell.innerHTML = '<span style="color:var(--warning)">Dò vết...</span>';

                // BƯỚC 1: Dùng Mắt Thần (HackerTarget) - Phá Cloudflare cực mạnh
                try {
                    const htRes = await fetch(`https://api.hackertarget.com/httpheaders/?q=${encodeURIComponent(s.origin)}`);
                    if (htRes.ok) {
                        const headers = await htRes.text();
                        const locs = headers.matchAll(/Location:\s*(https?:\/\/[^\s]+)/gi);
                        for (const m of locs) {
                            let loc = m[1].trim(); if(!chain.includes(loc)) { chain.push(loc); actualFinal = loc; }
                        }
                    }
                } catch(e) {}

                // BƯỚC 2: Quét nội dung (AllOrigins) - Tìm Meta/JS
                try {
                    const aoRes = await fetch(proxies[0](s.origin));
                    if (aoRes.ok) {
                        const data = await aoRes.json();
                        const html = data.contents || "";
                        if (data.status && data.status.url && !chain.includes(data.status.url)) {
                            chain.push(data.status.url); actualFinal = data.status.url;
                        }
                        // Quét Meta/JS Redirect
                        const metaMatch = html.match(/url=([^"']+)["']/i);
                        const jsMatch = html.match(/location\.href\s*=\s*["']([^"']+)["']/i);
                        [metaMatch, jsMatch].forEach(m => {
                            if(m && m[1] && m[1].startsWith('http')) {
                                if(!chain.includes(m[1])) { chain.push(m[1]); actualFinal = m[1]; }
                            }
                        });
                    }
                } catch(e) {}

                // RENDER
                chainCell.innerHTML = `<div style="font-size:10px">${chain.length>1 ? chain.map(l => short(l)).join(' ➔ ') : 'Không nhảy'}</div>`;
                
                const isMatch = short(actualFinal) === short(s.recorded);
                matchCell.innerHTML = `
                    <div class="match-box ${isMatch?'match':'mismatch'}">
                        <div style="color:${isMatch?'var(--success)':'var(--danger)'};font-weight:bold;font-size:10px">${isMatch?'✅ KHỚP':'🚨 SAI LỆCH'}</div>
                        <div style="font-size:10px;word-break:break-all">${short(actualFinal)}</div>
                    </div>`;
                matchCell.dataset.url = actualFinal;
            }

            // 3. Admin & Login (Sử dụng Đích thực tế)
            if (opts.adm) {
                try {
                    const res = await fetch(proxies[1](actualFinal + s.admin));
                    document.getElementById(`chkAdmin_${i}`).innerHTML = res.ok ? '✅ OK' : '❌ Lỗi';
                } catch(e) { document.getElementById(`chkAdmin_${i}`).innerHTML = '-'; }
            }

            if (opts.log && s.user) {
                document.getElementById(`chkLogin_${i}`).innerHTML = `
                    <div class="login-cell">
                        <button class="btn-mini btn-main" onclick="doLogin('${actualFinal}','${s.admin}','${s.user}','${s.pass}')">🔑</button>
                        <button class="btn-mini" onclick="copyTxt('${s.user}')">U</button>
                        <button class="btn-mini" onclick="copyTxt('${s.pass}')">P</button>
                        <input type="checkbox" id="ok_${i}" checked>
                    </div>`;
            }
        }
    }

    function fixUrl(u) { if(!u) return ''; if(!u.startsWith('http')) u='https://'+u; if(!u.endsWith('/')) u+='/'; return u; }
    function short(u) { return u.replace('https://','').replace('http://','').replace(/\/$/,''); }
    function copyTxt(t) { navigator.clipboard.writeText(t); }
    function doLogin(b, a, u, p) {
        const tab = window.open('', '_blank');
        tab.document.write(`<form id="f" method="POST" action="${b+a}"><input name="log" value="${u}"><input name="pwd" value="${p}"></form><script>document.getElementById('f').submit();<\/script>`);
    }
    function copyCol(prefix) {
        const txt = Array.from(document.querySelectorAll(`[id^="${prefix}"]`)).map(c => c.dataset.url || c.innerText).join('\n');
        navigator.clipboard.writeText(txt); alert('Đã copy!');
    }
    function filterFails() { document.querySelectorAll('#checkResultBody tr').forEach(tr => { if(tr.querySelector('input[type="checkbox"]:checked')) tr.style.display='none'; }); }
    function showAll() { document.querySelectorAll('#checkResultBody tr').forEach(tr => tr.style.display=''); }

    const gScript = document.createElement('script'); gScript.src='https://accounts.google.com/gsi/client'; document.head.appendChild(gScript);
</script>
</body>
</html>
