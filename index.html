<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSC Bulk & SEO Automation - Vidco Group</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
            border-radius: 8px;
        }

        .tab-btn.active {
            color: var(--text-main);
            background: var(--card-bg);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .tab-content {
            display: none;
            width: 100%;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 12px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: var(--border); cursor: not-allowed; }

        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending { background: #334155; color: #94a3b8; }
        .status-running { background: #1e3a8a; color: #60a5fa; animation: pulse 2s infinite; }
        .status-success { background: #064e3b; color: #34d399; }
        .status-error { background: #7f1d1d; color: #f87171; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .code-box {
            background: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #10b981;
            border: 1px solid #334155;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }

        .login-cell {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .btn-mini {
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
            background: var(--border);
            color: var(--text-main);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-mini:hover { border-color: var(--primary); }
        .btn-main { background: var(--primary); }

        .domain-cell {
            line-height: 1.4;
        }

        .check-options {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
        }

        .check-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            margin-bottom: 0;
            color: var(--text-main);
        }

        #filterBar, #redirectCopyBar {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Vidco SEO Bulk Automation</h1>
        <p style="color:var(--text-muted)">Hệ thống quản lý GSC & SEO đa năng v3.0</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tab1')">➕ Thêm GSC Bulk</button>
        <button class="tab-btn" onclick="showTab('tab2')">🔍 Check Website Status</button>
    </div>

    <!-- TAB 1: ADD GSC -->
    <div id="tab1" class="tab-content active">
        <div class="card">
            <h3 style="margin-top:0">Nhập danh sách Website (Google Search Console)</h3>
            <div class="form-group">
                <label>Mỗi website một dòng:</label>
                <textarea id="domainList" placeholder="https://example1.com&#10;https://example2.com"></textarea>
            </div>
            <button id="btnStart" class="btn">🚀 Bắt đầu thêm & lấy mã</button>
            <p id="authStatus" style="margin-top:10px; font-size:0.9rem; color:var(--warning)"></p>
        </div>

        <div class="card">
            <h3>Kết Quả Xử Lý</h3>
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>Website</th>
                        <th>Trạng thái</th>
                        <th>Xác Minh</th>
                        <th>Mã Meta Tag (HTML)</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
    </div>

    <!-- TAB 2: CHECK STATUS -->
    <div id="tab2" class="tab-content">
        <div class="card">
            <h3 style="margin-top:0">Nhập danh sách Website cần kiểm tra</h3>
            <div class="form-group">
                <label>Nhập mẫu: <b>Gốc [cách] Đang_theo_dõi [cách] đuôi_admin [cách] user [cách] pass</b></label>
                <textarea id="checkDomainList" placeholder="88vin.cx	ydn.uk.com	web_auth	seo	kOqIFJrMBiCDzG"></textarea>
            </div>
            <div class="check-options">
                <label><input type="checkbox" id="optWebsite" checked> 🌐 Trạng thái Website</label>
                <label><input type="checkbox" id="opt301" checked> 🔄 Kiểm tra 301</label>
                <label><input type="checkbox" id="optAdmin" checked> 🔑 Đuôi quản trị (WP-Admin)</label>
                <label><input type="checkbox" id="optLogin" checked> 🔐 Đăng nhập nhanh</label>
            </div>
            <button id="btnCheck" class="btn btn-warning">🔍 Đang kiểm tra...</button>
        </div>

        <div class="card">
            <h3>Kết Quả Kiểm Tra</h3>
            <div id="checkResult">
                <table id="checkResultTable">
                    <thead>
                        <tr>
                            <th>Website URL</th>
                        </tr>
                    </thead>
                    <tbody id="checkResultBody"></tbody>
                </table>
            </div>

            <div id="filterBar" style="display:none;">
                <button class="btn btn-danger" style="margin-top:0; padding:10px 20px;" onclick="filterFailedLogins()">🔴 Lọc web lỗi đăng nhập</button>
                <button class="btn" style="margin-top:0; padding:10px 20px;" onclick="showAllRows()">📋 Hiện lại tất cả</button>
                <span id="filterInfo" style="color:var(--text-muted); font-size:13px;"></span>
            </div>
            <div id="redirectCopyBar" style="display:none; display:flex; gap:10px; align-items:center;">
                <button class="btn btn-success" style="padding:10px 20px; font-size:13px; margin:0;" onclick="copyRedirectColumn()">📋 Copy cột Đích Cuối</button>
                <button class="btn" style="background:#6366f1; padding:10px 20px; font-size:13px; margin:0;" onclick="copyChainColumn()">📋 Copy cột Chuỗi (Dò vết)</button>
                <span id="redirectCopyInfo" style="color:var(--text-muted); font-size:13px;"></span>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CẤU HÌNH OAUTH ---
    const CLIENT_ID = '376378457788-i7v1u8pce8j91m9s341g234c9f13eie9.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/webmasters https://www.googleapis.com/auth/siteverification';
    let accessToken = null;

    // --- CHUYỂN TAB ---
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- LOGIC TAB 1: ADD GSC ---
    document.getElementById('btnStart').onclick = () => {
        const domains = document.getElementById('domainList').value.split('\n').filter(d => d.trim());
        if (domains.length === 0) return alert('Nhập domain đã sếp ơi!');
        
        const client = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (response) => {
                accessToken = response.access_token;
                document.getElementById('authStatus').textContent = '✅ Đã kết nối Google. Đang xử lý...';
                startProcess(domains);
            },
        });
        client.requestAccessToken();
    };

    async function startProcess(domains) {
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        
        // 1. Lấy danh sách site hiện có để skip
        const existingSites = await getExistingSites();

        for (let i = 0; i < domains.length; i++) {
            let domain = domains[i].trim();
            if (!domain.startsWith('http')) domain = 'https://' + domain;
            if (!domain.endsWith('/')) domain += '/';

            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${domain}</td><td id="st_${i}"><span class="status-badge status-running">Đang check...</span></td><td id="v_${i}">-</td><td id="code_${i}">...</td><td id="act_${i}">-</td>`;
            tbody.appendChild(tr);

            // Kiểm tra xem site đã tồn tại và có quyền chủ sở hữu chưa
            const existing = existingSites.find(s => s.siteUrl === domain);
            
            if (existing && existing.permissionLevel === 'siteOwner') {
                document.getElementById(`st_${i}`).innerHTML = '<span class="status-badge status-success">Đã tồn tại (Owner)</span>';
                document.getElementById(`v_${i}`).innerHTML = '✅ OK';
                document.getElementById(`code_${i}`).innerHTML = '<span style="color:var(--text-muted)">Đã xác minh xong</span>';
            } else {
                // Thêm site vào GSC
                await addSiteToGSC(domain, i);
                // Lấy mã HTML Meta Tag
                await getVerificationTag(domain, i);
            }
        }
    }

    async function getExistingSites() {
        try {
            const res = await fetch('https://www.googleapis.com/webmasters/v3/sites', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await res.json();
            return data.siteEntry || [];
        } catch (e) { return []; }
    }

    async function addSiteToGSC(domain, idx) {
        try {
            const res = await fetch(`https://www.googleapis.com/webmasters/v3/sites/${encodeURIComponent(domain)}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            if (res.ok) {
                document.getElementById(`st_${idx}`).innerHTML = '<span class="status-badge status-success">Đã thêm</span>';
            } else {
                document.getElementById(`st_${idx}`).innerHTML = '<span class="status-badge status-error">Lỗi thêm site</span>';
            }
        } catch (e) {}
    }

    async function getVerificationTag(domain, idx) {
        try {
            const res = await fetch(`https://www.googleapis.com/siteVerification/v1/token`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    verificationMethod: 'FILE',
                    site: { identifier: domain, type: 'SITE' }
                })
            });
            // Nếu FILE không được, thử META
            const resMeta = await fetch(`https://www.googleapis.com/siteVerification/v1/token`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    verificationMethod: 'META',
                    site: { identifier: domain, type: 'SITE' }
                })
            });
            const data = await resMeta.json();
            if (data.token) {
                document.getElementById(`code_${idx}`).innerHTML = `<div class="code-box" id="tag_${idx}">${data.token}</div>`;
                document.getElementById(`act_${idx}`).innerHTML = `
                    <button class="btn-mini btn-main" onclick="copyText(this, '${data.token.replace(/'/g, "\\'")}')">Copy</button>
                    <button class="btn-mini" style="background:var(--success)" onclick="verifySite('${domain}', ${idx})">⚡ Xác minh</button>`;
            } else {
                document.getElementById(`code_${idx}`).textContent = 'Không lấy được mã';
            }
        } catch (e) {}
    }

    async function verifySite(domain, idx) {
        const btn = event.target;
        btn.textContent = '...';
        try {
            const res = await fetch(`https://www.googleapis.com/siteVerification/v1/webResource?verificationMethod=META`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    site: { identifier: domain, type: 'SITE' }
                })
            });
            if (res.ok) {
                document.getElementById(`v_${idx}`).innerHTML = '✅ Thành công!';
                document.getElementById(`st_${idx}`).innerHTML = '<span class="status-badge status-success">Đã Xác Minh</span>';
            } else {
                const err = await res.json();
                alert('Xác minh thất bại! Sếp hãy chắc chắn đã dán mã vào Web.\nLỗi: ' + (err.error.message || 'Chưa tìm thấy thẻ meta'));
                btn.textContent = '⚡ Thử lại';
            }
        } catch (e) { alert('Lỗi kết nối API!'); btn.textContent = '⚡ Thử lại'; }
    }

    // --- LOGIC TAB 2: CHECK WEBSITE ---
    const proxies = [
        (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
    ];

    document.getElementById('btnCheck').onclick = startCheck;

    async function startCheck() {
        const lines = document.getElementById('checkDomainList').value.split('\n').filter(l => l.trim());
        if (lines.length === 0) return alert('Nhập list đã sếp!');

        const doWebsite = document.getElementById('optWebsite').checked;
        const do301 = document.getElementById('opt301').checked;
        const doAdmin = document.getElementById('optAdmin').checked;
        const doLogin = document.getElementById('optLogin').checked;

        const tbody = document.getElementById('checkResultBody');
        const thead = tbody.closest('table').querySelector('thead tr');
        thead.innerHTML = '<th>Website URL</th>';
        if (doWebsite) thead.innerHTML += '<th>Trạng thái</th><th>HTTP Code</th>';
        if (do301) thead.innerHTML += '<th>Chuỗi Redirect</th><th>So khớp 301</th>';
        if (doAdmin) thead.innerHTML += '<th>WP-Admin</th>';
        if (doLogin) thead.innerHTML += '<th>Đăng nhập</th>';
        tbody.innerHTML = '';

        // Parse 5 trường
        const sites = lines.map(line => {
            const parts = line.split(/[\t ]+/);
            let origin = parts[0];
            if (!origin.startsWith('http')) origin = 'https://' + origin;
            if (!origin.endsWith('/')) origin += '/';
            let recorded = parts[1] || parts[0];
            if (!recorded.startsWith('http')) recorded = 'https://' + recorded;
            if (!recorded.endsWith('/')) recorded += '/';
            const adminPath = parts[2] || 'wp-admin';
            const user = parts[3] || '';
            const pass = parts[4] || '';
            return { origin, recorded, adminPath, user, pass };
        });

        // Render dòng chờ
        sites.forEach((site, idx) => {
            const tr = document.createElement('tr');
            tr.id = `chk_${idx}`;
            let originShort = site.origin.replace('https://','').replace('http://','').replace(/\/$/,'');
            let recordedShort = site.recorded.replace('https://','').replace('http://','').replace(/\/$/,'');
            let cells = `
                <td class="domain-cell" style="font-size:12px;">
                    <div style="color:var(--text-muted)">Gốc: <a href="${site.origin}" target="_blank" style="color:var(--primary)">${originShort}</a></div>
                    <div style="margin-top:4px;">🎯 <span>${recordedShort}</span></div>
                </td>`;
            if (doWebsite) cells += `<td id="chkStatus_${idx}"><span class="status-badge status-pending">Đang chờ</span></td><td id="chkCode_${idx}">...</td>`;
            if (do301) cells += `<td id="chkChain_${idx}">...</td><td id="chkMatch_${idx}">...</td>`;
            if (doAdmin) cells += `<td id="chkAdmin_${idx}">...</td>`;
            if (doLogin) cells += `<td id="chkLogin_${idx}">${site.user ? '...' : '-'}</td>`;
            tr.innerHTML = cells;
            tbody.appendChild(tr);
        });

        document.getElementById('filterBar').style.display = 'flex';
        document.getElementById('redirectCopyBar').style.display = 'flex';

        // Bắt đầu quét
        for (let i = 0; i < sites.length; i++) {
            const site = sites[i];
            let siteOk = false;
            let actualFinalUrl = site.origin;

            // 1. Website Status (Gốc)
            if (doWebsite) {
                const statusCell = document.getElementById(`chkStatus_${i}`);
                const codeCell = document.getElementById(`chkCode_${i}`);
                statusCell.innerHTML = '<span class="status-badge status-running">Check...</span>';
                
                try {
                    const res = await fetch(proxies[0](site.origin));
                    codeCell.textContent = res.status;
                    if (res.ok) {
                        statusCell.innerHTML = '<span class="status-badge status-success">✅ Live</span>';
                        siteOk = true;
                    } else {
                        statusCell.innerHTML = '<span class="status-badge status-error">❌ Lỗi/Die</span>';
                    }
                } catch(e) { statusCell.innerHTML = '<span class="status-badge status-error">❌ Timeout</span>'; }
            } else { siteOk = true; }

            // 2. Dò vết 301 & So khớp (Quan trọng)
            if (do301) {
                const chainCell = document.getElementById(`chkChain_${i}`);
                const matchCell = document.getElementById(`chkMatch_${i}`);
                chainCell.innerHTML = '<span style="color:var(--warning);font-size:11px">Dò...</span>';

                let chain = [site.origin];
                try {
                    // Dùng AllOrigins để bóc tách sâu
                    const traceRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(site.origin)}`);
                    if (traceRes.ok) {
                        const data = await traceRes.json();
                        actualFinalUrl = (data.status && data.status.url) ? data.status.url : actualFinalUrl;
                        
                        const html = data.contents || "";
                        // Quét Meta Refresh
                        const refreshMatch = html.match(/content=["'][^"']+url=([^"']+)["']/i);
                        // Quét JS
                        const jsMatch = html.match(/location\.href\s*=\s*["']([^"']+)["']/i);
                        // Quét Canonical
                        const canonMatch = html.match(/<link[^>]+rel=["']canonical["'][^>]+href=["']([^"']+)["']/i);

                        [refreshMatch, jsMatch, canonMatch].forEach(m => {
                            if (m && m[1]) {
                                let link = m[1].trim();
                                if (link.startsWith('http')) {
                                    if (!chain.includes(link) && !link.includes(new URL(site.origin).hostname)) {
                                        chain.push(link);
                                        actualFinalUrl = link;
                                    }
                                }
                            }
                        });
                        if (actualFinalUrl !== site.origin && !chain.includes(actualFinalUrl)) chain.push(actualFinalUrl);
                    }
                } catch(e) {}

                // Render Chain
                if (chain.length > 1) {
                    chainCell.innerHTML = `<div style="font-size:10px; line-height:1.2;">${chain.map(l => l.replace('https://','').replace('http://','').replace(/\/$/,'')).join(' ➔ ')}</div>`;
                } else {
                    chainCell.innerHTML = '<span style="color:var(--text-muted);font-size:11px">Không nhảy</span>';
                }

                // Render So khớp
                const actualDomain = new URL(actualFinalUrl).hostname.replace('www.', '').toLowerCase();
                const recordedDomain = new URL(site.recorded).hostname.replace('www.', '').toLowerCase();
                const isMatch = actualDomain === recordedDomain;
                const displayFinal = actualFinalUrl.replace('https://','').replace('http://','').replace(/\/$/,'');

                matchCell.innerHTML = `
                    <div style="padding:4px; border-radius:4px; border:1px solid ${isMatch ? 'var(--success)' : '#ef4444'}; background:${isMatch ? 'rgba(16, 185, 129, 0.05)' : 'rgba(239, 68, 68, 0.1)'}">
                        <div style="color:${isMatch ? 'var(--success)' : '#ef4444'}; font-weight:bold; font-size:10px;">${isMatch ? '✅ KHỚP' : '🚨 SAI LỆCH'}</div>
                        <div style="color:${isMatch ? '#fff' : '#ef4444'}; font-size:10px; word-break:break-all;">${displayFinal}</div>
                    </div>`;
                matchCell.dataset.url = actualFinalUrl;
                matchCell.dataset.redirected = !isMatch;
            }

            // 3. Admin & Login (Dùng đích thực tế)
            if (doAdmin) {
                const cell = document.getElementById(`chkAdmin_${i}`);
                cell.innerHTML = '...';
                try {
                    const res = await fetch(proxies[0](actualFinalUrl + site.adminPath));
                    if (res.ok) cell.innerHTML = '<span class="status-badge status-success">✅ OK</span>';
                    else cell.innerHTML = '<span class="status-badge status-error">❌ Lỗi</span>';
                } catch(e) { cell.innerHTML = '-'; }
            }

            if (doLogin && site.user && site.pass) {
                document.getElementById(`chkLogin_${i}`).innerHTML = `
                    <div class="login-cell">
                        <button class="btn-mini btn-main" onclick="openLogin('${actualFinalUrl}', '${site.adminPath}', '${site.user}', '${site.pass}')">🔑</button>
                        <button class="btn-mini" onclick="copyText(this, '${site.user}')">U</button>
                        <button class="btn-mini" onclick="copyText(this, '${site.pass}')">P</button>
                        <input type="checkbox" id="loginOk_${i}" checked>
                    </div>`;
            }
        }
    }

    // --- HÀM HỖ TRỢ ---
    function copyText(btn, text) {
        navigator.clipboard.writeText(text);
        const old = btn.textContent;
        btn.textContent = '✅';
        setTimeout(() => btn.textContent = old, 1000);
    }

    function openLogin(baseUrl, adminPath, user, pass) {
        let url = baseUrl;
        if (!url.endsWith('/')) url += '/';
        url += adminPath;
        const newTab = window.open('', '_blank');
        newTab.document.write(`
            <form id="f" method="POST" action="${url}">
                <input name="log" value="${user}">
                <input name="pwd" value="${pass}">
            </form>
            <script>document.getElementById('f').submit();<\/script>
        `);
    }

    function copyRedirectColumn() {
        const urls = Array.from(document.querySelectorAll('[id^="chkMatch_"]')).map(c => c.dataset.url).filter(u => u);
        navigator.clipboard.writeText(urls.join('\n'));
        alert('Đã copy danh sách URL đích!');
    }

    function copyChainColumn() {
        const chains = Array.from(document.querySelectorAll('[id^="chkChain_"]')).map(c => c.innerText.trim()).filter(t => t);
        navigator.clipboard.writeText(chains.join('\n'));
        alert('Đã copy danh sách chuỗi nhảy!');
    }

    function filterFailedLogins() {
        document.querySelectorAll('#checkResultBody tr').forEach(tr => {
            const cb = tr.querySelector('input[type="checkbox"]');
            if (cb && cb.checked) tr.style.display = 'none';
        });
    }

    function showAllRows() {
        document.querySelectorAll('#checkResultBody tr').forEach(tr => tr.style.display = '');
    }

    // Load Google script
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    document.head.appendChild(script);
</script>

</body>
</html>
